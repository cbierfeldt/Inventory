
<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Tracking System</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#121212;color:#fff;padding:20px;margin:0}
.container{max-width:1400px;margin:auto}
.card{background:#1e1e1e;padding:20px;border-radius:12px;margin-bottom:20px}
.header{display:flex;justify-content:space-between;align-items:center}
.stats{display:flex;gap:15px;flex-wrap:wrap;margin:20px 0}
.stat-box{flex:1;min-width:180px;background:#1e1e1e;padding:15px;border-radius:12px;text-align:center}
.stat-number{font-size:28px;font-weight:bold;color:#4caf50}
input{width:100%;padding:10px;background:#2b2b2b;color:#fff;border:1px solid #444;border-radius:8px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-primary{background:#0078d7;color:#fff}
.btn-success{background:#28a745;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.btn-dark{background:#6c757d;color:#fff}
.table-actions{display:flex;gap:5px;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #444}
th{background:#0078d7}
.alert{background:#382f00;padding:15px;border-radius:10px;margin-bottom:20px}
.light-mode{background:#f4f4f4;color:#000}
.light-mode .card,.light-mode .stat-box{background:#fff}
.light-mode input{background:#fff;color:#000}
.low-stock{color:#ff6b6b;font-weight:bold}
#reader{max-width:400px;margin-top:15px}
</style>
</head>
<body>
<div class="container">

<div class="header">
<h1>📦 Inventory Tracking System</h1>
<button class="btn-dark" onclick="toggleTheme()">🌙 Toggle Theme</button>
</div>

<div class="stats">
<div class="stat-box"><div>Total Items</div><div class="stat-number" id="totalItems">0</div></div>
<div class="stat-box"><div>Total Quantity</div><div class="stat-number" id="totalQuantity">0</div></div>
<div class="stat-box"><div>Low Stock</div><div class="stat-number" id="lowStockCount">0</div></div>
</div>

<div class="alert">
<strong>⚠ Low Stock Alerts</strong>
<ul id="alerts"></ul>
</div>

<div class="card">
<div class="form-grid">
<input id="name" placeholder="Item Name">
<input id="qty" type="number" min="0" placeholder="Quantity">
<input id="location" placeholder="Location">
<div>
<input id="barcode" placeholder="Barcode / SKU">
<button class="btn-success" type="button" onclick="startScanner()" style="margin-top:8px;">📷 Scan Barcode</button>
</div>
</div>
<div id="reader"></div>
<br>
<button id="saveBtn" class="btn-primary" onclick="saveItem()">Add Item</button>
</div>

<div class="card">
<input id="search" placeholder="Search inventory..." onkeyup="render()">
<br><br>
<table>
<thead>
<tr>
<th>Item</th>
<th>Quantity</th>
<th>Location</th>
<th>Barcode</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>

<div class="card">
<h2>📋 History</h2>
<table>
<thead>
<tr>
<th>Action</th>
<th>Item</th>
<th>Quantity</th>
<th>Date/Time</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>

</div>

<script>
let items = JSON.parse(localStorage.getItem('items')) || [];
let history = JSON.parse(localStorage.getItem('history')) || [];
let editId = null;
let scannerRunning = false;
let htmlScanner = null;

function saveStorage(){
localStorage.setItem('items',JSON.stringify(items));
localStorage.setItem('history',JSON.stringify(history));
}

function clearForm(){
document.getElementById('name').value='';
document.getElementById('qty').value='';
document.getElementById('location').value='';
document.getElementById('barcode').value='';
editId=null;
document.getElementById('saveBtn').innerText='Add Item';
}

function saveItem(){
const name=document.getElementById('name').value.trim();
const quantity=Number(document.getElementById('qty').value);
const location=document.getElementById('location').value.trim();
const barcode=document.getElementById('barcode').value.trim();

if(name===''){alert('Enter an item name');return;}
if(!Number.isFinite(quantity)||quantity<0){alert('Enter a valid quantity');return;}

const item={id:editId||Date.now(),name,quantity,location,barcode};

if(editId){
items=items.map(i=>i.id===editId?item:i);
}else{
items.push(item);
}

saveStorage();
clearForm();
render();
}

function editItem(id){
const item=items.find(i=>i.id===id);
document.getElementById('name').value=item.name;
document.getElementById('qty').value=item.quantity;
document.getElementById('location').value=item.location;
document.getElementById('barcode').value=item.barcode;
editId=id;
document.getElementById('saveBtn').innerText='Update Item';
}

function deleteItem(id){
items=items.filter(i=>i.id!==id);
saveStorage();
render();
}

function addHistory(action,item){
history.unshift({action,item:item.name,quantity:item.quantity,date:new Date().toLocaleString()});
saveStorage();
}

function checkIn(id){
const item=items.find(i=>i.id===id);
item.quantity++;
addHistory('Check-In',item);
saveStorage();
render();
}

function checkOut(id){
const item=items.find(i=>i.id===id);
if(item.quantity>0){
item.quantity--;
addHistory('Check-Out',item);
}
saveStorage();
render();
}

function toggleTheme(){
document.body.classList.toggle('light-mode');
}

function startScanner(){
if(scannerRunning) return;
htmlScanner=new Html5Qrcode('reader');
htmlScanner.start(
{ facingMode:'environment' },
{ fps:10, qrbox:250 },
function(decodedText){
document.getElementById('barcode').value=decodedText;
htmlScanner.stop().then(()=>{
document.getElementById('reader').innerHTML='';
scannerRunning=false;
});
alert('Barcode Scanned: '+decodedText);
},
function(errorMessage){}
);
scannerRunning=true;
}

function render(){
const search=document.getElementById('search').value.toLowerCase();
const table=document.getElementById('inventoryTable');
const alerts=document.getElementById('alerts');
const historyTable=document.getElementById('historyTable');

alerts.innerHTML='';
table.innerHTML='';
historyTable.innerHTML='';

document.getElementById('totalItems').innerText=items.length;
document.getElementById('totalQuantity').innerText=items.reduce((a,b)=>a+b.quantity,0);
document.getElementById('lowStockCount').innerText=items.filter(i=>i.quantity<=5).length;

items.filter(item=>item.name.toLowerCase().includes(search)||item.barcode.toLowerCase().includes(search))
.forEach(item=>{
if(item.quantity<=5){alerts.innerHTML+=`<li>${item.name} (${item.quantity} remaining)</li>`;}

table.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>${item.location}</td>
<td>${item.barcode}</td>
<td>${item.quantity<=5?'<span class="low-stock">Low Stock</span>':'In Stock'}</td>
<td>
<div class="table-actions">
<button class="btn-primary" onclick="editItem(${item.id})">Edit</button>
<button class="btn-success" onclick="checkIn(${item.id})">+1</button>
<button class="btn-warning" onclick="checkOut(${item.id})">-1</button>
<button class="btn-danger" onclick="deleteItem(${item.id})">Delete</button>
</div>
</td>
</tr>`;
});

if(alerts.innerHTML===''){alerts.innerHTML='<li>No low stock items.</li>';}

history.forEach(record=>{
historyTable.innerHTML+=`<tr><td>${record.action}</td><td>${record.item}</td><td>${record.quantity}</td><td>${record.date}</td></tr>`;
});
}

render();
</script>
</body>
