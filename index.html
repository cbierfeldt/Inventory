<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#121212">
<title>Inventory Tracker V5</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#121212;color:#fff;margin:0;padding:20px}
.hidden{display:none}.container{max-width:1400px;margin:auto}
.card{background:#1e1e1e;border-radius:12px;padding:15px;margin-bottom:15px}
.nav{display:flex;gap:10px;margin-bottom:15px}
.nav button,.btn{border:none;border-radius:8px;padding:10px 15px;cursor:pointer;color:#fff}
.nav button{background:#2563eb}.btn-edit{background:#0d6efd}.btn-add{background:#22c55e}.btn-remove{background:#f59e0b}.btn-delete{background:#ef4444}
input{width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid #444;background:#2a2a2a;color:#fff;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stat{background:#1e1e1e;border-radius:12px;padding:15px;text-align:center}
.stat-number{font-size:28px;font-weight:bold;color:#22c55e}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #444;padding:8px}th{background:#2563eb}.low{color:#ff6b6b;font-weight:bold}
.table-actions{display:flex;gap:5px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="container">

<div class="nav">
<button onclick="showPage('inventory')">Inventory</button>
<button onclick="showPage('scanin')">Scan In</button>
<button onclick="showPage('scanout')">Scan Out</button>
</div>

<div id="inventory" class="page">
<div class="stats">
<div class="stat"><div>Total Items</div><div id="totalItems" class="stat-number">0</div></div>
<div class="stat"><div>Total Qty</div><div id="totalQty" class="stat-number">0</div></div>
<div class="stat"><div>Low Stock</div><div id="lowStock" class="stat-number">0</div></div>
</div>

<div class="card">
<div class="grid">
<input id="name" placeholder="Item Name">
<input id="qty" type="number" placeholder="Quantity">
<input id="location" placeholder="Location">
<input id="barcode" placeholder="Barcode">
</div>
<button class="btn btn-edit" onclick="saveItem()">Save Item</button>
</div>

<div class="card">
<input id="search" placeholder="Search" onkeyup="render()">
</div>

<div class="card">
<h3>Low Stock Alerts</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<table>
<thead><tr><th>Item</th><th>Qty</th><th>Location</th><th>Barcode</th><th>Status</th><th>Actions</th></tr></thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>

<div class="card">
<h3>History</h3>
<table>
<thead><tr><th>Action</th><th>Item</th><th>Qty</th><th>Date</th></tr></thead>
<tbody id="historyTable"></tbody>
</table>
</div>
</div>

<div id="scanin" class="page hidden">
<div class="card">
<h2>Scan In</h2>
<div id="readerIn"></div>
<button class="btn btn-add" onclick="startScanIn()">Start Scan In</button>
</div>
</div>

<div id="scanout" class="page hidden">
<div class="card">
<h2>Scan Out</h2>
<div id="readerOut"></div>
<button class="btn btn-remove" onclick="startScanOut()">Start Scan Out</button>
</div>
</div>

</div>

<script>
let items=JSON.parse(localStorage.getItem('items'))||[];
let history=JSON.parse(localStorage.getItem('history'))||[];
let editId=null;

function saveStorage(){localStorage.setItem('items',JSON.stringify(items));localStorage.setItem('history',JSON.stringify(history));}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function addHistory(action,item){history.unshift({action,item:item.name,qty:item.quantity,date:new Date().toLocaleString()});saveStorage();}

function saveItem(){
const item={id:editId||Date.now(),name:name.value.trim(),quantity:Number(qty.value),location:location.value.trim(),barcode:barcode.value.trim()};
if(!item.name||isNaN(item.quantity)) return;
if(editId){items=items.map(i=>i.id===editId?item:i);} else {items.push(item);}
editId=null;name.value='';qty.value='';location.value='';barcode.value='';
saveStorage();render();
}

function editItem(id){const i=items.find(x=>x.id===id);name.value=i.name;qty.value=i.quantity;location.value=i.location;barcode.value=i.barcode;editId=id;}
function deleteItem(id){items=items.filter(i=>i.id!==id);saveStorage();render();}
function addOne(id){const i=items.find(x=>x.id===id);i.quantity++;addHistory('Manual +1',i);saveStorage();render();}
function removeOne(id){const i=items.find(x=>x.id===id);if(i.quantity>0){i.quantity--;addHistory('Manual -1',i);}saveStorage();render();}

function scanInBarcode(code){const i=items.find(x=>x.barcode===code);if(!i){alert('Item not found');return;}i.quantity++;addHistory('Check-In',i);saveStorage();render();alert(i.name+' checked in');}
function scanOutBarcode(code){const i=items.find(x=>x.barcode===code);if(!i){alert('Item not found');return;}if(i.quantity<=0){alert('No stock');return;}i.quantity--;addHistory('Check-Out',i);saveStorage();render();alert(i.name+' checked out');}

function startScanIn(){const s=new Html5Qrcode('readerIn');s.start({facingMode:'environment'},{fps:10,qrbox:250},t=>{s.stop();scanInBarcode(t);},()=>{});}
function startScanOut(){const s=new Html5Qrcode('readerOut');s.start({facingMode:'environment'},{fps:10,qrbox:250},t=>{s.stop();scanOutBarcode(t);},()=>{});}

function render(){
const q=(document.getElementById('search')?.value||'').toLowerCase();
inventoryTable.innerHTML='';alerts.innerHTML='';historyTable.innerHTML='';

document.getElementById('totalItems').innerText=items.length;
document.getElementById('totalQty').innerText=items.reduce((a,b)=>a+b.quantity,0);
document.getElementById('lowStock').innerText=items.filter(i=>i.quantity<=5).length;

items.filter(i=>i.name.toLowerCase().includes(q)||i.barcode.toLowerCase().includes(q)).forEach(i=>{
if(i.quantity<=5) alerts.innerHTML+=`<li>${i.name} (${i.quantity})</li>`;
inventoryTable.innerHTML+=`<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.location}</td><td>${i.barcode}</td><td>${i.quantity<=5?'<span class=\"low\">Low Stock</span>':'In Stock'}</td><td><div class='table-actions'><button class='btn-edit' onclick='editItem(${i.id})'>Edit</button><button class='btn-add' onclick='addOne(${i.id})'>+1</button><button class='btn-remove' onclick='removeOne(${i.id})'>-1</button><button class='btn-delete' onclick='deleteItem(${i.id})'>Delete</button></div></td></tr>`;
});
if(alerts.innerHTML==='') alerts.innerHTML='<li>No low stock items</li>';
history.forEach(h=>historyTable.innerHTML+=`<tr><td>${h.action}</td><td>${h.item}</td><td>${h.qty}</td><td>${h.date}</td></tr>`);
}
render();
</script>
</body>
