<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Inventory Tracker</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body{font-family:Arial,sans-serif;background:#121212;color:#fff;margin:0;padding:20px}
.hidden{display:none}.card{background:#1e1e1e;padding:15px;border-radius:10px;margin:10px 0}
button{padding:10px;border:none;border-radius:6px;margin:2px;cursor:pointer}
input{padding:10px;width:100%;box-sizing:border-box;margin:4px 0}
.nav button{background:#0078d7;color:#fff}
table{width:100%;border-collapse:collapse}td,th{border:1px solid #444;padding:8px}th{background:#0078d7}
.low{color:#ff6b6b;font-weight:bold}
</style>
</head>
<body>

<div class='nav'>
<button onclick="showPage('inventory')">Inventory</button>
<button onclick="showPage('scanin')">Scan In</button>
<button onclick="showPage('scanout')">Scan Out</button>
</div>

<div id='inventory' class='page'>
<div class='card'>
<h2>Inventory</h2>
<input id='name' placeholder='Item Name'>
<input id='qty' type='number' placeholder='Quantity'>
<input id='location' placeholder='Location'>
<input id='barcode' placeholder='Barcode'>
<button onclick='saveItem()'>Save Item</button>
</div>

<div class='card'>
<input id='search' placeholder='Search' onkeyup='render()'>
</div>

<div class='card'>
<h3>Low Stock Alerts</h3>
<ul id='alerts'></ul>
</div>

<div class='card'>
<table>
<thead><tr><th>Item</th><th>Qty</th><th>Location</th><th>Barcode</th><th>Status</th><th>Actions</th></tr></thead>
<tbody id='inventoryTable'></tbody>
</table>
</div>

<div class='card'>
<h3>History</h3>
<table>
<thead><tr><th>Action</th><th>Item</th><th>Qty</th><th>Date</th></tr></thead>
<tbody id='historyTable'></tbody>
</table>
</div>
</div>

<div id='scanin' class='page hidden'>
<div class='card'>
<h2>Scan In</h2>
<div id='readerIn'></div>
<button onclick='startScanIn()'>Start Scan In</button>
</div>
</div>

<div id='scanout' class='page hidden'>
<div class='card'>
<h2>Scan Out</h2>
<div id='readerOut'></div>
<button onclick='startScanOut()'>Start Scan Out</button>
</div>
</div>

<script>
let items=JSON.parse(localStorage.getItem('items'))||[];
let history=JSON.parse(localStorage.getItem('history'))||[];
let editId=null;

function saveStorage(){localStorage.setItem('items',JSON.stringify(items));localStorage.setItem('history',JSON.stringify(history));}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

function saveItem(){
const item={id:editId||Date.now(),name:name.value.trim(),quantity:Number(qty.value),location:location.value.trim(),barcode:barcode.value.trim()};
if(!item.name||isNaN(item.quantity)) return;
if(editId){items=items.map(i=>i.id===editId?item:i);} else {items.push(item);} 
saveStorage();clearForm();render();}

function clearForm(){name.value='';qty.value='';location.value='';barcode.value='';editId=null;}

function editItem(id){const i=items.find(x=>x.id===id);name.value=i.name;qty.value=i.quantity;location.value=i.location;barcode.value=i.barcode;editId=id;}

function deleteItem(id){items=items.filter(i=>i.id!==id);saveStorage();render();}

function addHistory(action,item){history.unshift({action,item:item.name,qty:item.quantity,date:new Date().toLocaleString()});saveStorage();}

function scanInBarcode(code){const item=items.find(i=>i.barcode===code);if(!item){alert('Item not found');return;} item.quantity++;addHistory('Check-In',item);saveStorage();render();alert(item.name+' checked in');}

function scanOutBarcode(code){const item=items.find(i=>i.barcode===code);if(!item){alert('Item not found');return;} if(item.quantity<=0){alert('No stock');return;} item.quantity--;addHistory('Check-Out',item);saveStorage();render();alert(item.name+' checked out');}

function startScanIn(){const s=new Html5Qrcode('readerIn');s.start({facingMode:'environment'},{fps:10,qrbox:250},txt=>{s.stop();scanInBarcode(txt);},()=>{});}

function startScanOut(){const s=new Html5Qrcode('readerOut');s.start({facingMode:'environment'},{fps:10,qrbox:250},txt=>{s.stop();scanOutBarcode(txt);},()=>{});}

function render(){
let q=(search?.value||'').toLowerCase();
inventoryTable.innerHTML='';alerts.innerHTML='';historyTable.innerHTML='';
items.filter(i=>i.name.toLowerCase().includes(q)||i.barcode.toLowerCase().includes(q)).forEach(i=>{
if(i.quantity<=5) alerts.innerHTML+=`<li>${i.name} (${i.quantity})</li>`;
inventoryTable.innerHTML+=`<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.location}</td><td>${i.barcode}</td><td>${i.quantity<=5?'<span class="low">Low Stock</span>':'In Stock'}</td><td><button onclick='editItem(${i.id})'>Edit</button><button onclick='deleteItem(${i.id})'>Delete</button></td></tr>`;
});
history.forEach(h=>historyTable.innerHTML+=`<tr><td>${h.action}</td><td>${h.item}</td><td>${h.qty}</td><td>${h.date}</td></tr>`);
if(alerts.innerHTML==='') alerts.innerHTML='<li>No low stock items</li>';
}

render();
</script>
</body>
