<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Inventory Tracking System</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#121212;color:#fff;padding:20px;margin:0}
.container{max-width:1400px;margin:auto}
.card{background:#1e1e1e;padding:20px;border-radius:12px;margin-bottom:20px}
.stats{display:flex;gap:15px;flex-wrap:wrap;margin:20px 0}
.stat-box{flex:1;min-width:180px;background:#1e1e1e;padding:15px;border-radius:12px;text-align:center}
.stat-number{font-size:28px;font-weight:bold;color:#4caf50}
input{width:100%;padding:10px;background:#2b2b2b;color:#fff;border:1px solid #444;border-radius:8px;box-sizing:border-box}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-primary{background:#0078d7;color:#fff}
.btn-success{background:#28a745;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.table-actions{display:flex;gap:5px;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.hidden{display:none}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #444}
th{background:#0078d7}
.low-stock{color:#ff6b6b;font-weight:bold}
</style>
</head>
<body>
<div class="container">

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
<button class="btn-primary" onclick="showPage('inventoryPage')">📦 Inventory</button>
<button class="btn-success" onclick="showPage('scanInPage')">📥 Scan In</button>
<button class="btn-warning" onclick="showPage('scanOutPage')">📤 Scan Out</button>
</div>

<div id="inventoryPage">

<div class="stats">
<div class="stat-box"><div>Total Items</div><div class="stat-number" id="totalItems">0</div></div>
<div class="stat-box"><div>Total Quantity</div><div class="stat-number" id="totalQuantity">0</div></div>
<div class="stat-box"><div>Low Stock</div><div class="stat-number" id="lowStockCount">0</div></div>
</div>

<div class="card">
<div class="form-grid">
<input id="name" placeholder="Item Name">
<input id="qty" type="number" min="0" placeholder="Quantity">
<input id="location" placeholder="Location">
<input id="barcode" placeholder="Barcode / SKU">
</div>
<br>
<button id="saveBtn" class="btn-primary" onclick="saveItem()">Add Item</button>
</div>

<div class="card">
<input id="search" placeholder="Search inventory..." onkeyup="render()">
</div>

<div class="card">
<h3>Low Stock Alerts</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<table>
<thead>
<tr><th>Item</th><th>Qty</th><th>Location</th><th>Barcode</th><th>Status</th><th>Actions</th></tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>

<div class="card">
<h3>History</h3>
<table>
<thead><tr><th>Action</th><th>Item</th><th>Qty</th><th>Date</th></tr></thead>
<tbody id="historyTable"></tbody>
</table>
</div>

</div>

<div id="scanInPage" class="hidden">
<div class="card">
<h2>📥 Scan In</h2>
<div id="readerIn"></div>
<button class="btn-success" onclick="startScanIn()">Start Scanner</button>
</div>
</div>

<div id="scanOutPage" class="hidden">
<div class="card">
<h2>📤 Scan Out</h2>
<div id="readerOut"></div>
<button class="btn-warning" onclick="startScanOut()">Start Scanner</button>
</div>
</div>

</div>

<script>
let items=JSON.parse(localStorage.getItem('items'))||[];
let history=JSON.parse(localStorage.getItem('history'))||[];
let editId=null;

function saveStorage(){
localStorage.setItem('items',JSON.stringify(items));
localStorage.setItem('history',JSON.stringify(history));
}

function showPage(page){
document.getElementById('inventoryPage').classList.add('hidden');
document.getElementById('scanInPage').classList.add('hidden');
document.getElementById('scanOutPage').classList.add('hidden');
document.getElementById(page).classList.remove('hidden');
}

function saveItem(){
const name=document.getElementById('name').value.trim();
const quantity=Number(document.getElementById('qty').value);
const location=document.getElementById('location').value.trim();
const barcode=document.getElementById('barcode').value.trim();

if(!name)return alert('Enter item name');
if(!Number.isFinite(quantity)||quantity<0)return alert('Enter quantity');

const item={id:editId||Date.now(),name,quantity,location,barcode};

if(editId){items=items.map(i=>i.id===editId?item:i);}else{items.push(item);}

editId=null;
document.getElementById('name').value='';
document.getElementById('qty').value='';
document.getElementById('location').value='';
document.getElementById('barcode').value='';
document.getElementById('saveBtn').innerText='Add Item';

saveStorage();
render();
}

function editItem(id){
const item=items.find(i=>i.id===id);
document.getElementById('name').value=item.name;
document.getElementById('qty').value=item.quantity;
document.getElementById('location').value=item.location;
document.getElementById('barcode').value=item.barcode;
editId=id;
document.getElementById('saveBtn').innerText='Update Item';
}

function deleteItem(id){items=items.filter(i=>i.id!==id);saveStorage();render();}

function addHistory(action,item){
history.unshift({action,item:item.name,quantity:item.quantity,date:new Date().toLocaleString()});
saveStorage();
}

function checkIn(id){const item=items.find(i=>i.id===id);item.quantity++;addHistory('Manual +1',item);saveStorage();render();}
function checkOut(id){const item=items.find(i=>i.id===id);if(item.quantity>0){item.quantity--;addHistory('Manual -1',item);}saveStorage();render();}

function scanInLookup(code){
const item=items.find(i=>i.barcode===code);
if(!item)return alert('Item not found');
item.quantity++;
addHistory('Scan-In',item);
saveStorage();render();
alert(item.name+' checked in');
}

function scanOutLookup(code){
const item=items.find(i=>i.barcode===code);
if(!item)return alert('Item not found');
if(item.quantity<=0)return alert('No stock remaining');
item.quantity--;
addHistory('Scan-Out',item);
saveStorage();render();
alert(item.name+' checked out');
}

function startScanIn(){
const scanner=new Html5Qrcode('readerIn');
scanner.start({facingMode:'environment'},{fps:10,qrbox:250},txt=>{scanner.stop();scanInLookup(txt);},()=>{});
}

function startScanOut(){
const scanner=new Html5Qrcode('readerOut');
scanner.start({facingMode:'environment'},{fps:10,qrbox:250},txt=>{scanner.stop();scanOutLookup(txt);},()=>{});
}

function render(){
const search=(document.getElementById('search').value||'').toLowerCase();
const table=document.getElementById('inventoryTable');
const alerts=document.getElementById('alerts');
const historyTable=document.getElementById('historyTable');

table.innerHTML='';alerts.innerHTML='';historyTable.innerHTML='';

document.getElementById('totalItems').innerText=items.length;
document.getElementById('totalQuantity').innerText=items.reduce((a,b)=>a+b.quantity,0);
document.getElementById('lowStockCount').innerText=items.filter(i=>i.quantity<=5).length;

items.filter(i=>i.name.toLowerCase().includes(search)||i.barcode.toLowerCase().includes(search)).forEach(item=>{
if(item.quantity<=5){alerts.innerHTML+=`<li>${item.name} (${item.quantity})</li>`;}

table.innerHTML+=`<tr><td>${item.name}</td><td>${item.quantity}</td><td>${item.location}</td><td>${item.barcode}</td><td>${item.quantity<=5?'<span class="low-stock">Low Stock</span>':'In Stock'}</td><td><div class="table-actions"><button class="btn-primary" onclick="editItem(${item.id})">Edit</button><button class="btn-success" onclick="checkIn(${item.id})">+1</button><button class="btn-warning" onclick="checkOut(${item.id})">-1</button><button class="btn-danger" onclick="deleteItem(${item.id})">Delete</button></div></td></tr>`;
});

if(alerts.innerHTML==='')alerts.innerHTML='<li>No low stock items</li>';

history.forEach(r=>{
historyTable.innerHTML+=`<tr><td>${r.action}</td><td>${r.item}</td><td>${r.quantity}</td><td>${r.date}</td></tr>`;
});
}

render();
</script>
</body>
